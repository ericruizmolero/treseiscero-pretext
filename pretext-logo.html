<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>treseiscero — pretext</title>
<style>
  @font-face { font-family: 'Satoshi'; src: url('/Satoshi-Light.otf')   format('opentype'); font-weight: 300; }
  @font-face { font-family: 'Satoshi'; src: url('/Satoshi-Regular.otf') format('opentype'); font-weight: 400; }
  @font-face { font-family: 'Satoshi'; src: url('/Satoshi-Medium.otf')  format('opentype'); font-weight: 500; }
  @font-face { font-family: 'Satoshi'; src: url('/Satoshi-Bold.otf')    format('opentype'); font-weight: 700; }
  @font-face { font-family: 'Satoshi'; src: url('/Satoshi-Black.otf')   format('opentype'); font-weight: 900; }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #F9F9F1;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* ── Logo wrapper ─────────────────────────────────────────── */
  #logo-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }

  #canvas {
    display: block;
    width: min(90vw, 1100px);
    max-width: calc(100vw - 32px);
    aspect-ratio: 1000 / 146;
    transition: opacity 0.6s ease;
  }

  #drag-hint {
    position: absolute;
    bottom: -22px; left: 50%;
    transform: translateX(-50%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 10px; letter-spacing: 0.08em;
    color: rgba(2,45,66,0.25);
    white-space: nowrap;
    pointer-events: none;
    animation: hint-fade 4s ease forwards;
    animation-delay: 1.5s;
    opacity: 0;
  }
  @keyframes hint-fade {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    70%  { opacity: 1; }
    100% { opacity: 0; }
  }

  #svg-crisp {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  /* Cuando está activo el SVG, el canvas desaparece */
  #logo-wrap.svg-mode #canvas   { opacity: 0; }
  #logo-wrap.svg-mode #svg-crisp { opacity: 1; }

  @media (max-width: 480px) {
    #morph { bottom: 16px; right: 16px; }
    #morph.open { width: calc(100vw - 32px) !important; }
    #play-btn { bottom: 16px; right: 64px; }
    #drag-hint { font-size: 9px; }
  }

  /* ── Play button ─────────────────────────────────────────── */
  #play-btn {
    position: fixed;
    bottom: 24px; right: 72px;
    z-index: 20;
    width: 40px; height: 40px;
    border-radius: 13px;
    background: rgba(2,45,66,0.07);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid rgba(2,45,66,0.08);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }
  #play-btn:hover { background: rgba(2,45,66,0.13); }
  #play-btn.playing {
    background: rgba(2,45,66,0.1);
    box-shadow: 0 0 0 1.5px rgba(2,45,66,0.2);
  }
  #play-btn svg { width: 14px; height: 14px; color: rgba(2,45,66,0.4); transition: color 0.2s; }
  #play-btn:hover svg, #play-btn.playing svg { color: #022D42; }
  #play-btn .icon-stop { display: none; }
  #play-btn.playing .icon-play { display: none; }
  #play-btn.playing .icon-stop { display: block; }

  /* ── Panel morph ──────────────────────────────────────────── */
  #morph {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 20;
    overflow: hidden;
    width: 40px;
    max-height: 40px;
    border-radius: 13px;
    background: rgba(2, 45, 66, 0.07);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid rgba(2, 45, 66, 0.08);
    cursor: grab;
    transition:
      width      0.5s cubic-bezier(0.32, 0.72, 0, 1),
      max-height 0.5s cubic-bezier(0.32, 0.72, 0, 1),
      border-radius 0.4s cubic-bezier(0.32, 0.72, 0, 1),
      background 0.3s ease,
      box-shadow 0.35s ease;
  }
  #morph.dragging { cursor: grabbing !important; transition: none !important; }
  #morph.open {
    width: 318px !important;
    max-height: min(600px, calc(100vh - 60px)) !important;
    border-radius: 18px;
    background: rgba(249, 249, 241, 0.88);
    box-shadow: 0 12px 48px rgba(2,45,66,0.12), 0 0 0 0.5px rgba(2,45,66,0.04);
    cursor: default;
  }

  .morph-icon {
    position: absolute; top: 0; left: 0;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.08s ease;
    pointer-events: none;
  }
  .morph-icon svg { width: 16px; height: 16px; color: rgba(2,45,66,0.4); transition: color 0.2s; }
  #morph:not(.open):hover .morph-icon svg { color: #022D42; }
  #morph.open .morph-icon { opacity: 0; }

  /* ── Drag bar (handle al abrir el panel) ─────────────────── */
  .drag-bar {
    display: flex; justify-content: center; align-items: center;
    padding: 10px 0 4px;
    cursor: grab;
    opacity: 0;
    transition: opacity 0.2s ease 0.2s;
  }
  .drag-bar::before {
    content: '';
    width: 32px; height: 4px;
    border-radius: 2px;
    background: rgba(2,45,66,0.15);
  }
  .drag-bar:active, #morph.dragging .drag-bar { cursor: grabbing; }
  #morph.open .drag-bar { opacity: 1; }

  .morph-content {
    opacity: 0;
    transform: translateY(5px);
    transition: opacity 0.1s ease, transform 0.1s ease;
    pointer-events: none;
    min-width: 290px;
    padding: 0 0 6px;
    overflow-y: auto;
    max-height: calc(min(600px, 100vh - 60px) - 28px);
  }
  #morph.open .morph-content {
    opacity: 1; transform: translateY(0); pointer-events: auto;
    transition: opacity 0.28s ease 0.12s, transform 0.28s ease 0.12s;
  }

  /* ── Sections ─────────────────────────────────────────────── */
  .s { padding: 3px 8px; }
  .s + .s { border-top: 1px solid rgba(2,45,66,0.05); }

  /* ── Rows ─────────────────────────────────────────────────── */
  .r {
    display: flex; align-items: center;
    padding: 9px 12px; border-radius: 10px; gap: 14px;
  }
  .r label {
    flex: 0 0 80px;
    font-size: 12px; font-weight: 500;
    color: rgba(2,45,66,0.45);
    letter-spacing: -0.1px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .r input[type="range"] {
    flex: 1; height: 2px;
    -webkit-appearance: none; appearance: none;
    background: rgba(2,45,66,0.08); border-radius: 1px; outline: none;
  }
  .r input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px; border-radius: 50%;
    background: #022D42; border: none;
    box-shadow: 0 1px 4px rgba(2,45,66,0.25);
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .r input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
  .r input[type="range"]:active::-webkit-slider-thumb { transform: scale(1.15); }
  .r .val {
    flex: 0 0 28px; text-align: right;
    font-size: 11px; font-family: 'Satoshi', sans-serif;
    color: rgba(2,45,66,0.35);
  }

  /* ── Footer ───────────────────────────────────────────────── */
  .foot { padding: 4px 8px 6px; display: flex; gap: 6px; }
  .foot button {
    flex: 1; padding: 8px 0; border-radius: 10px; border: none;
    background: rgba(2,45,66,0.05); color: rgba(2,45,66,0.45);
    font-size: 12px; font-weight: 500; cursor: pointer;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    transition: background 0.15s, color 0.15s;
  }
  .foot button:hover { background: rgba(2,45,66,0.1); color: #022D42; }

  /* ── Weight selector ─────────────────────────────────────── */
  .weight-row {
    display: flex; gap: 4px;
    padding: 6px 12px 10px;
  }
  .w-btn {
    flex: 1; padding: 6px 0;
    border: none; border-radius: 8px;
    background: rgba(2,45,66,0.05);
    color: rgba(2,45,66,0.4);
    font-size: 11px; font-weight: 500; cursor: pointer;
    font-family: 'Satoshi', sans-serif;
    transition: background 0.15s, color 0.15s;
  }
  .w-btn:hover { background: rgba(2,45,66,0.1); color: #022D42; }
  .w-btn.active { background: #022D42; color: #F9F9F1; }

  /* ── Section title ────────────────────────────────────────── */
  .stitle {
    padding: 8px 20px 2px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase;
    color: rgba(2,45,66,0.25);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
</style>
</head>

/* ── Defaults ────────────────────────────────────────────────── */
const DEFAULTS = {
  fontSize:      8,
  lineHeight:    1.25,
  letterSpacing: 0,
  wordGap:       0,
  alphaThresh:   8,
  brightness:    100,
  cursorRadius:  130,
  cursorForce:   3,
  returnSpeed:   5,
  fontWeight:    400,
}

// Config mutable — los sliders escriben aquí
const cfg = { ...DEFAULTS }

/* ── Canvas + máscara ────────────────────────────────────────── */
// DPR: multiplica la resolución interna del canvas por el pixel ratio del
// dispositivo → en pantallas retina/4K las letras quedan perfectamente nítidas.
const DPR      = Math.min(window.devicePixelRatio || 1, 3)
const DISPLAY_W = Math.min(window.innerWidth * 0.9, 1100)
const RENDER_W  = Math.round(DISPLAY_W * DPR)
const RENDER_H  = Math.round(RENDER_W * (18 / 123))
const COLOR     = { r: 2, g: 45, b: 66 }

const canvas = document.getElementById('canvas')
const ctx    = canvas.getContext('2d')

canvas.width  = RENDER_W
canvas.height = RENDER_H
// Tamaño CSS gestionado por la hoja de estilos (min(90vw,1100px) + aspect-ratio)

await document.fonts.ready

// Rasterizar SVG → máscara (solo una vez)
const mask = await new Promise((resolve, reject) => {
  const blob = new Blob([SVG_SRC], { type: 'image/svg+xml' })
  const url  = URL.createObjectURL(blob)
  const img  = new Image()
  img.onload = () => {
    const off = document.createElement('canvas')
    off.width = RENDER_W; off.height = RENDER_H
    const oc = off.getContext('2d')
    oc.drawImage(img, 0, 0, RENDER_W, RENDER_H)
    URL.revokeObjectURL(url)
    resolve(oc.getImageData(0, 0, RENDER_W, RENDER_H))
  }
  img.onerror = () => { URL.revokeObjectURL(url); reject() }
  img.src = url
})

function maskAlpha(x, y) {
  const px = Math.round(x), py = Math.round(y)
  if (px < 0 || px >= RENDER_W || py < 0 || py >= RENDER_H) return 0
  return mask.data[(py * RENDER_W + px) * 4 + 3]
}

/* ── Partículas ──────────────────────────────────────────────── */
let particles = []

function rebuild() {
  // Multiplicar por DPR → coordenadas canvas reales → letras nítidas en retina/4K
  const font  = `${cfg.fontWeight} ${cfg.fontSize * DPR}px 'Satoshi', sans-serif`
  const lineH = Math.round(cfg.fontSize * cfg.lineHeight * DPR)
  const WORD     = 'treseiscero'
  const WORD_LEN = WORD.length

  ctx.font = font

  const rows     = Math.ceil(RENDER_H / lineH) + 2
  const estCols  = Math.ceil(RENDER_W / (cfg.fontSize * DPR * 0.55))
  const longText = WORD.repeat(Math.ceil((rows * estCols * 2) / WORD_LEN) + 4)

  const prepared  = prepareWithSegments(longText, font)
  const { lines } = layoutWithLines(prepared, RENDER_W, lineH)

  const pixelMode    = cfg.fontSize <= 4
  const fixedCellW   = cfg.fontSize * 0.62 * DPR
  const effectThresh = pixelMode ? 1 : cfg.alphaThresh

  const next = []
  let globalCharIdx = 0

  for (let li = 0; li < lines.length; li++) {
    const lineText = lines[li].text
    const oy = li * lineH

    let x = 0
    for (let ci = 0; ci < lineText.length; ci++) {
      const ch = lineText[ci]
      // En pixel mode: ancho de celda fijo y uniforme (sin kerning variable)
      const cw = pixelMode
        ? fixedCellW
        : ctx.measureText(ch).width + cfg.letterSpacing * DPR

      if (cfg.wordGap > 0 && globalCharIdx % WORD_LEN === 0 && globalCharIdx > 0) {
        x += cfg.wordGap * DPR
      }

      const sampleX = x + cw * 0.5
      const sampleY = oy + cfg.fontSize * DPR * 0.5
      const alpha   = maskAlpha(sampleX, sampleY)

      if (alpha >= effectThresh) {
        const existing = particles.find(p => p.ox === x && p.oy === oy)
        next.push({
          ox: x,  oy,
          x:  existing ? existing.x : x,
          y:  existing ? existing.y : oy,
          vx: existing ? existing.vx : 0,
          vy: existing ? existing.vy : 0,
          ch,
          cw,      // almacenamos el ancho para renderizar el rectángulo
          lineH,   // y la altura de línea
          rawA: alpha / 255,
        })
      }

      x += cw
      globalCharIdx++

      if (x > RENDER_W + cfg.fontSize * 2) break
    }
  }

  particles = next
}

/* ── Mouse ───────────────────────────────────────────────────── */
let scaleX = 2, scaleY = 2
const mouse = { x: -9999, y: -9999, active: false }

window.addEventListener('mousemove', (e) => {
  const r = canvas.getBoundingClientRect()
  scaleX = RENDER_W / r.width
  scaleY = RENDER_H / r.height
  const cx = (e.clientX - r.left) * scaleX
  const cy = (e.clientY - r.top)  * scaleY
  if (cx >= 0 && cx <= RENDER_W && cy >= 0 && cy <= RENDER_H) {
    mouse.x = cx; mouse.y = cy; mouse.active = true
  } else {
    mouse.active = false
  }
})
window.addEventListener('mouseleave', () => { mouse.active = false })

/* ── Animación ───────────────────────────────────────────────── */
const fc = COLOR
const FRICTION = 0.75

function animate() {
  ctx.clearRect(0, 0, RENDER_W, RENDER_H)
  ctx.font = `${cfg.fontWeight} ${cfg.fontSize * DPR}px 'Satoshi', sans-serif`
  ctx.textBaseline = 'top'

  const retSpeed = cfg.returnSpeed / 100
  const brightness = cfg.brightness / 100

  for (const p of particles) {
    if (mouse.active) {
      const dx = p.x - mouse.x
      const dy = p.y - mouse.y
      const d2 = dx * dx + dy * dy
      const r  = cfg.cursorRadius * DPR
      if (d2 < r * r && d2 > 0) {
        const d   = Math.sqrt(d2)
        const f   = ((r - d) / r) ** 2 * cfg.cursorForce * 0.5
        const ang = Math.atan2(dy, dx)
        p.vx += Math.cos(ang) * f
        p.vy += Math.sin(ang) * f
      }
    }

    p.vx += (p.ox - p.x) * retSpeed
    p.vy += (p.oy - p.y) * retSpeed
    p.vx *= FRICTION
    p.vy *= FRICTION
    p.x  += p.vx
    p.y  += p.vy

    ctx.fillStyle = `rgba(${fc.r},${fc.g},${fc.b},${p.rawA * brightness})`
    if (cfg.fontSize <= 4) {
      // Pixel mode: rectángulo uniforme = nitidez perfecta del SVG
      ctx.fillRect(Math.round(p.x), Math.round(p.y), Math.ceil(p.cw), Math.ceil(p.lineH))
    } else {
      ctx.fillText(p.ch, p.x, p.y)
    }
  }

  requestAnimationFrame(animate)
}

/* ── Panel de controles ──────────────────────────────────────── */
// Sliders que requieren rebuild al cambiar
const REBUILD_KEYS = ['fontSize', 'lineHeight', 'letterSpacing', 'wordGap', 'alphaThresh']

let rebuildTimer = null
function scheduleRebuild() {
  clearTimeout(rebuildTimer)
  rebuildTimer = setTimeout(rebuild, 80)
}

document.querySelectorAll('input[type="range"]').forEach(input => {
  const key  = input.id
  const disp = document.getElementById('v-' + key)

  input.addEventListener('input', () => {
    const val = parseFloat(input.value)
    cfg[key] = val
    if (disp) disp.textContent = val
    if (REBUILD_KEYS.includes(key)) scheduleRebuild()
  })
})

// Selector de peso tipográfico
document.querySelectorAll('.w-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.w-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    cfg.fontWeight = parseInt(btn.dataset.weight)
    scheduleRebuild()
  })
})

document.getElementById('reset-btn').addEventListener('click', () => {
  Object.assign(cfg, DEFAULTS)
  document.querySelectorAll('input[type="range"]').forEach(input => {
    const key = input.id
    if (DEFAULTS[key] !== undefined) {
      input.value = DEFAULTS[key]
      const disp = document.getElementById('v-' + key)
      if (disp) disp.textContent = DEFAULTS[key]
    }
  })
  document.querySelectorAll('.w-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.weight) === DEFAULTS.fontWeight)
  })
  rebuild()
})

// ── Draggable ─────────────────────────────────────────────────
// Umbral de 5px antes de activar drag — los clics normales siguen funcionando.
// Sin preventDefault/stopPropagation para no bloquear otros eventos.
function makeDraggable(el, handleEl, useTransform = false) {
  let startMx, startMy, startL, startT
  let tx = 0, ty = 0, startTx, startTy
  let active = false

  function getXY(e) {
    const src = e.touches ? e.touches[0] : e
    return { x: src.clientX, y: src.clientY }
  }

  function onStart(e) {
    if (!e.touches && e.button !== 0) return
    const { x, y } = getXY(e)
    startMx = x; startMy = y
    active = false
    if (useTransform) { startTx = tx; startTy = ty }
    else { const r = el.getBoundingClientRect(); startL = r.left; startT = r.top }

    const onMove = (e) => {
      const { x, y } = getXY(e)
      const dx = x - startMx, dy = y - startMy
      if (!active && Math.abs(dx) + Math.abs(dy) < 5) return
      if (!active) {
        active = true
        if (!useTransform) {
          el.style.right = 'auto'; el.style.bottom = 'auto'
          el.style.left = startL + 'px'; el.style.top = startT + 'px'
        }
        el.classList.add('dragging')
      }
      if (useTransform) {
        tx = startTx + dx; ty = startTy + dy
        el.style.transform = `translate(${tx}px,${ty}px)`
      } else {
        el.style.left = (startL + dx) + 'px'
        el.style.top  = (startT + dy) + 'px'
      }
      if (e.touches) e.preventDefault()
    }

    const onUp = () => {
      active = false
      el.classList.remove('dragging')
      document.removeEventListener('mousemove', onMove)
      document.removeEventListener('mouseup', onUp)
      document.removeEventListener('touchmove', onMove)
      document.removeEventListener('touchend', onUp)
    }

    document.addEventListener('mousemove', onMove)
    document.addEventListener('mouseup', onUp)
    document.addEventListener('touchmove', onMove, { passive: false })
    document.addEventListener('touchend', onUp)
  }

  handleEl.addEventListener('mousedown', onStart)
  handleEl.addEventListener('touchstart', onStart, { passive: true })
}

// Canvas: draggable con transform (no rompe el layout flex)
const logoWrap = document.getElementById('logo-wrap')
logoWrap.style.cursor = 'grab'
logoWrap.addEventListener('mousedown', () => { logoWrap.style.cursor = 'grabbing' })
document.addEventListener('mouseup',   () => { logoWrap.style.cursor = 'grab' })
makeDraggable(logoWrap, logoWrap, true)

// ── Crossfade canvas ↔ SVG ────────────────────────────────────
const SVG_MODE_THRESHOLD = 4  // px — valor mínimo del slider

function updateSVGMode() {
  if (cfg.fontSize <= SVG_MODE_THRESHOLD) {
    logoWrap.classList.add('svg-mode')
  } else {
    logoWrap.classList.remove('svg-mode')
  }
}

// Enganchar al slider de fontSize
document.getElementById('fontSize').addEventListener('input', updateSVGMode)
document.getElementById('reset-btn').addEventListener('click', updateSVGMode, { capture: true })

// Abrir/cerrar panel + drag
const morph = document.getElementById('morph')
const panelDragBar = document.getElementById('panel-drag-bar')
makeDraggable(morph, panelDragBar)   // abierto: solo desde la barra
// Cerrado: el botón entero, pero solo si el panel NO está abierto
morph.addEventListener('mousedown', (e) => {
  if (morph.classList.contains('open')) return
  panelDragBar.dispatchEvent(new MouseEvent('mousedown', e))
})

morph.addEventListener('click', (e) => {
  if (!morph.classList.contains('open')) morph.classList.add('open')
})
document.addEventListener('click', (e) => {
  if (morph.classList.contains('open') && !morph.contains(e.target)) {
    morph.classList.remove('open')
  }
})

/* ── Descargas ───────────────────────────────────────────────── */
function download(url, filename) {
  const a = Object.assign(document.createElement('a'), { href: url, download: filename })
  a.click()
  URL.revokeObjectURL(a.href)
}

document.getElementById('dl-png').addEventListener('click', () => {
  download(canvas.toDataURL('image/png'), 'treseiscero.png')
})

document.getElementById('dl-svg').addEventListener('click', () => {
  const svgEl  = document.getElementById('svg-crisp')
  const serial = new XMLSerializer().serializeToString(svgEl)
  const blob   = new Blob([serial], { type: 'image/svg+xml' })
  download(URL.createObjectURL(blob), 'treseiscero.svg')
})

/* ── Play mode ───────────────────────────────────────────────── */
let playing   = false
let playRAF   = null
let playStart = 0

// Cada parámetro se anima con 3 ondas superpuestas de frecuencias y fases
// aleatorias → resultado orgánico e impredecible cada vez que se pulsa play.
const PLAY_PARAMS = [
  { key: 'fontSize',      min: 4,   max: 18  },
  { key: 'lineHeight',    min: 1.0, max: 2.1 },
  { key: 'letterSpacing', min: -1,  max: 7   },
  { key: 'alphaThresh',   min: 8,   max: 90  },
  { key: 'brightness',    min: 40,  max: 100 },
  { key: 'cursorRadius',  min: 50,  max: 320 },
]

let playWaves = []  // generadas aleatoriamente al pulsar play

function randomWaves() {
  // 3 ondas por parámetro, periodos cortos (1.5–6s) para que sea rápido
  return PLAY_PARAMS.map(() => [
    { period: 1500 + Math.random() * 2000, phase: Math.random() * Math.PI * 2, amp: 0.5 + Math.random() * 0.5 },
    { period: 3000 + Math.random() * 3000, phase: Math.random() * Math.PI * 2, amp: 0.3 + Math.random() * 0.4 },
    { period: 800  + Math.random() * 1200, phase: Math.random() * Math.PI * 2, amp: 0.1 + Math.random() * 0.2 },
  ])
}

function setParam(key, rawVal) {
  const input = document.getElementById(key)
  if (!input) return
  const v = Math.max(+input.min, Math.min(+input.max, rawVal))
  cfg[key] = v
  input.value = v
  const disp = document.getElementById('v-' + key)
  if (disp) disp.textContent = Math.round(v * 100) / 100
}

function playFrame(ts) {
  if (!playing) return
  const t = ts - playStart
  let needsRebuild = false

  PLAY_PARAMS.forEach(({ key, min, max }, i) => {
    const waves = playWaves[i]
    // Suma de ondas normalizada a [0,1]
    const totalAmp = waves.reduce((s, w) => s + w.amp, 0)
    const raw = waves.reduce((s, w) =>
      s + w.amp * (Math.sin(t / w.period * Math.PI * 2 + w.phase) * 0.5 + 0.5), 0)
    const v = min + (raw / totalAmp) * (max - min)
    setParam(key, v)
    if (REBUILD_KEYS.includes(key)) needsRebuild = true
  })

  if (needsRebuild) scheduleRebuild()
  updateSVGMode()
  playRAF = requestAnimationFrame(playFrame)
}

function togglePlay() {
  playing = !playing
  document.getElementById('play-btn').classList.toggle('playing', playing)
  if (playing) {
    playWaves = randomWaves()   // nueva secuencia aleatoria cada vez
    playStart = performance.now()
    playRAF = requestAnimationFrame(playFrame)
  } else {
    cancelAnimationFrame(playRAF)
  }
}

document.getElementById('play-btn').addEventListener('click', togglePlay)

/* ── Logo original ───────────────────────────────────────────── */
document.getElementById('original-btn').addEventListener('click', () => {
  if (playing) togglePlay()  // parar autoplay si está activo

  const startSize = cfg.fontSize
  const duration  = 600
  const startTs   = performance.now()

  ;(function step(ts) {
    const p = Math.min(1, (ts - startTs) / duration)
    // easeInOutQuad
    const ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2
    setParam('fontSize', startSize + (4 - startSize) * ease)
    scheduleRebuild()
    updateSVGMode()
    if (p < 1) requestAnimationFrame(step)
  })(startTs)
})

/* ── Boot ────────────────────────────────────────────────────── */
rebuild()
animate()
updateSVGMode()
</script>
