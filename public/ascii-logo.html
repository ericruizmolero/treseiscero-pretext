<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>treseiscero — ASCII</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #F9F9F1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #ascii-canvas {
    display: block;
  }

  #label {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(2, 45, 66, 0.25);
    font: 10px/1 'Space Mono', monospace;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>

<canvas id="ascii-canvas"></canvas>
<span id="label">pixel boutique</span>

<script>
(function () {

  /* ── Logo SVG (original paths) ──────────────────────────────── */

</svg>`;

  /* ── Config ─────────────────────────────────────────────────── */
  const CFG = {
    fontSize    : 2,
    density     : 28,
    alphaThresh : 8,       // min alpha to create a particle
    cursorRadius: 260,
    cursorForce : 3.5,
    idleTimeout : 180,
    scrollForce : 35,
    scrollDecay : 81,
    scrollMult  : 3,
    returnSpeed : 5,
    friction    : 75,
  };

  const ASCII_CHARS = '@#W$9876543210?!abc;:+=-,._ ';
  const FONT_COLOR  = { r: 2, g: 45, b: 66 };   // #022D42 navy

  /* ── State ──────────────────────────────────────────────────── */
  let scrollVelocity = 0;
  let lastScrollY = window.scrollY;
  let particles = [];
  let scaleX = 1, scaleY = 1;
  const mouse = { x: -9999, y: -9999, active: false };
  let mouseIdleTimer = null;

  window.addEventListener('scroll', () => {
    const cur = window.scrollY;
    scrollVelocity += (cur - lastScrollY) * 0.6;
    lastScrollY = cur;
  }, { passive: true });

  /* ── Particle ───────────────────────────────────────────────── */
  class Particle {
    constructor(x, y, char, alpha) {
      this.ox = x; this.oy = y;
      this.x  = x; this.y  = y;
      this.vx = 0; this.vy = 0;
      this.char  = char;
      this.alpha = alpha;
    }
    update() {
      const friction  = CFG.friction    / 100;
      const returnSpd = CFG.returnSpeed / 100;
      this.vx += (this.ox - this.x) * returnSpd;
      this.vy += (this.oy - this.y) * returnSpd;
      this.vx *= friction;
      this.vy *= friction;
      this.x  += this.vx;
      this.y  += this.vy;
    }
  }

  /* ── ASCII char selection ───────────────────────────────────── *
   *  alpha   = 0..255 (fully transparent → fully opaque)         *
   *  col/row = grid position for deterministic variety            */
  function pickChar(alpha, col, row) {
    const chars = ASCII_CHARS.slice(0, CFG.density);
    // Dense chars for high alpha; lighter chars for anti-alias edges
    const base  = 1 - alpha / 255;          // 0=opaque→dense, 1=transparent→light
    // Add position-based variation so interior isn't all the same char
    const noise = (Math.sin(col * 6.1 + row * 3.7) * 0.5 + 0.5) * 0.35;
    const t     = Math.min(1, base + noise);
    const i     = Math.floor(t * (chars.length - 1));
    return chars[Math.max(0, Math.min(i, chars.length - 1))];
  }

  /* ── Canvas ─────────────────────────────────────────────────── */
  const canvas = document.getElementById('ascii-canvas');
  const ctx    = canvas.getContext('2d');

  /* ── Render SVG → pixel data at target size ─────────────────── */
  function rasterizeSVG(targetW, targetH, callback) {
    const blob = new Blob([SVG_SRC], { type: 'image/svg+xml' });
    const url  = URL.createObjectURL(blob);
    const img  = new Image();

    img.onload = () => {
      const off = document.createElement('canvas');
      off.width  = targetW;
      off.height = targetH;
      const oc = off.getContext('2d');
      oc.drawImage(img, 0, 0, targetW, targetH);
      URL.revokeObjectURL(url);
      try {
        callback(oc.getImageData(0, 0, targetW, targetH), targetW, targetH);
      } catch (e) {
        console.error('ASCII: canvas error', e);
      }
    };
    img.onerror = (e) => { URL.revokeObjectURL(url); console.error('SVG load failed', e); };
    img.src = url;
  }

  /* ── Build particle grid from pixel data ────────────────────── */
  function buildFromPixels(imgData, cols, rows) {
    particles = [];
    const d = imgData.data;

    const fs    = CFG.fontSize;
    const lineH = fs * 1.0;   // tighter vertical spacing
    const charW = fs * 0.50;  // tighter horizontal spacing

    const gridW = cols * charW;
    const gridH = rows * lineH;
    canvas.width  = gridW;
    canvas.height = gridH;
    // Display at half size
    canvas.style.width  = (gridW  / 2) + 'px';
    canvas.style.height = (gridH / 2) + 'px';

    const rect = canvas.getBoundingClientRect();
    scaleX = gridW / (rect.width  || gridW);
    scaleY = gridH / (rect.height || gridH);

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const i = (row * cols + col) * 4;
        const a = d[i + 3];
        if (a < CFG.alphaThresh) continue;

        const ch = pickChar(a, col, row);
        if (ch === ' ') continue;

        particles.push(new Particle(col * charW, row * lineH, ch, a / 255));
      }
    }
  }

  /* ── Main build ─────────────────────────────────────────────── */
  function rebuild() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const fs    = CFG.fontSize;
    const lineH = fs * 1.3;
    const charW = fs * 0.62;

    // SVG aspect ratio: 123 / 18
    const aspect = 123 / 18;

    // Target: sample at 1000px → display at 500px
    let targetW = 1000;
    let targetH = Math.round(targetW / aspect);

    const cols = Math.floor(targetW / charW);
    const rows = Math.floor(targetH / lineH);
    if (cols < 1 || rows < 1) return;

    rasterizeSVG(cols, rows, (imgData, w, h) => buildFromPixels(imgData, w, h));
  }

  /* ── Mouse ──────────────────────────────────────────────────── */
  window.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    if (
      e.clientX >= rect.left && e.clientX <= rect.right &&
      e.clientY >= rect.top  && e.clientY <= rect.bottom
    ) {
      mouse.x = (e.clientX - rect.left) * scaleX;
      mouse.y = (e.clientY - rect.top)  * scaleY;
      mouse.active = true;
      clearTimeout(mouseIdleTimer);
      mouseIdleTimer = setTimeout(() => { mouse.active = false; }, CFG.idleTimeout);
    } else {
      mouse.active = false;
      mouse.x = -9999;
      mouse.y = -9999;
    }
  });

  /* ── Animation loop ─────────────────────────────────────────── */
  function animate() {
    scrollVelocity *= CFG.scrollDecay / 100;
    if (Math.abs(scrollVelocity) < 0.02) scrollVelocity = 0;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.font = `${CFG.fontSize}px 'Space Mono', monospace`;
    ctx.textBaseline = 'top';

    const fc = FONT_COLOR;

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];

      if (mouse.active) {
        const dx  = p.x - mouse.x;
        const dy  = p.y - mouse.y;
        const dSq = dx * dx + dy * dy;
        const r   = CFG.cursorRadius;
        if (dSq < r * r && dSq > 0) {
          const dist = Math.sqrt(dSq);
          const f    = (r - dist) / r;
          const ang  = Math.atan2(dy, dx);
          const str  = f * f * CFG.cursorForce * 0.5;
          p.vx += Math.cos(ang) * str;
          p.vy += Math.sin(ang) * str;
        }
      }

      const absScroll = Math.abs(scrollVelocity);
      if (absScroll > 0.3) {
        const sv  = Math.min(absScroll, 150) / 150;
        const ang = Math.random() * Math.PI * 2;
        const f   = sv * CFG.scrollForce * CFG.scrollMult * (0.15 + Math.random() * 0.85) * 0.08;
        p.vx += Math.cos(ang) * f;
        p.vy += Math.sin(ang) * f + (scrollVelocity > 0 ? 1 : -1) * sv * CFG.scrollForce * 0.04;
      }

      p.update();
      ctx.fillStyle = `rgba(${fc.r},${fc.g},${fc.b},${p.alpha})`;
      ctx.fillText(p.char, p.x, p.y);
    }

    requestAnimationFrame(animate);
  }

  /* ── Resize ─────────────────────────────────────────────────── */
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(rebuild, 250);
  });

  /* ── Boot ───────────────────────────────────────────────────── */
  function boot() {
    rebuild();
    animate();
  }

  if (document.readyState === 'complete') boot();
  else window.addEventListener('load', boot);

})();
</script>
</body>
</html>
